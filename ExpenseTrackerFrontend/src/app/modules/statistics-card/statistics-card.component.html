      <!-- HEADER -->
  <div class="card-header"  style="display: flex; align-items: stretch; justify-content: space-between;">

    <div>
      <p class="title" style="margin: 0;">{{ title }}</p>
      <h2 class="value" style="margin: 0">{{ value }}</h2>
    </div>

    <div class="icon-wrapper"  >
      <mat-icon 
        style="border-radius: 5px;" [style.backgroundColor]="color">

      {{ icon }}</mat-icon>
    </div>

  </div>

<div class="chart-container">
  <canvas
    baseChart
    [data]="lineChartData"
    [options]="lineChartOptions"
    [style.borderColor]="color"
    [type]="'line'"
    style="height: 70px;"
    >
  </canvas>
</div>

  </div>
